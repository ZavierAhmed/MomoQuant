services:
  momo-mysql:
    image: mysql:8.4
    container_name: momo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - momo_mysql_data:/var/lib/mysql
    networks:
      - momo-network

  momo-redis:
    image: redis:7.4
    container_name: momo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - momo_redis_data:/data
    networks:
      - momo-network

volumes:
  momo_mysql_data:
  momo_redis_data:

networks:
  momo-network:
    driver: bridge